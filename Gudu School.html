<!DOCTYPE html>
<html>
<head>
    <title>Aditya Birla School</title>

    <style>
        .blink-blue {
            color: #0084ff;
            animation: blink 1s infinite;
        }

        .blink-orange {
            color: #e27d2b;
            animation: blink 1s infinite;
        }

        .blink-pink {
            color: #e22bae;
            animation: blink 1s infinite;
        }

        .blink-purple {
            color: #7a2be2;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        body {
            text-align: center;
            font-family: Arial;
            background-color: rgb(249, 247, 249);
        }
    </style>
</head>

<body>

    <h1 class="blink-blue">
        Welcome to Aditya Birla School
    </h1>

    <h1 class="blink-blue">
        WELCOME TO Hyderabad
    </h1>

    <h2 class="blink-orange">
        Shreeram Prasad Nayak
    </h2>

    <h2 class="blink-pink">
        Niharika Nayak
    </h2>

    <h2 class="blink-purple">
        Satyaprakash Nayak
    </h2>

</body>
</html>
